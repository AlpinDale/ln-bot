services:
  lnbot:
    build: .
    image: ln-bot:latest
    restart: unless-stopped
    environment:
      LNBOT_DISCORD_TOKEN: ${LNBOT_DISCORD_TOKEN:?set in .env or environment}
      # Cloudflare URL Scanner credentials, used to fetch anti-bot-gated
      # hosts (Seven Seas) from Cloudflare's infrastructure. Optional —
      # omit to fall back to browser-TLS (works from residential IPs).
      LNBOT_CF_ACCOUNT: ${LNBOT_CF_ACCOUNT:-}
      LNBOT_CF_TOKEN: ${LNBOT_CF_TOKEN:-}
    volumes:
      - ./config.yaml:/config.yaml:ro
      - ./data:/data
